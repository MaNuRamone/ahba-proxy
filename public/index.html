<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AHBA Hockey Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00c853; --green-dim: #00c85322; --green-glow: #00c85355;
    --dark: #0a0f0d; --card: #111a14; --card2: #162019;
    --border: #1e2e21; --text: #e8f5e9; --muted: #6b8f72;
    --red: #ff3d3d; --yellow: #ffd600; --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding-bottom: 90px; }

  .header { background: linear-gradient(180deg,#0d1f10,var(--dark)); padding: 20px 16px 12px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .logo-circle { width: 42px; height: 42px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; box-shadow: 0 0 16px var(--green-glow); }
  .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; line-height: 1; }
  .header-sub { font-size: 11px; color: var(--muted); }
  .torneo-badge { margin-left: auto; background: var(--green-dim); border: 1px solid var(--green); border-radius: 20px; padding: 4px 10px; font-size: 11px; color: var(--green); font-weight: 500; white-space: nowrap; max-width: 140px; overflow: hidden; text-overflow: ellipsis; }

  .selector-bar { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
  .selector-bar::-webkit-scrollbar { display: none; }
  .cat-chip { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 12px; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.2s; flex-shrink: 0; }
  .cat-chip.active { background: var(--green); color: var(--dark); border-color: var(--green); font-weight: 700; }

  .nav-tabs { position: fixed; bottom: 0; left: 0; right: 0; background: #0d1a10ee; backdrop-filter: blur(16px); border-top: 1px solid var(--border); display: flex; z-index: 100; }
  .nav-tab { flex: 1; padding: 12px 4px 14px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: var(--muted); font-size: 10px; font-weight: 500; transition: color 0.2s; border: none; background: none; }
  .nav-tab.active { color: var(--green); }
  .nav-tab svg { width: 22px; height: 22px; }

  .content { padding: 16px; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: var(--muted); font-size: 14px; }

  .error-box { background: #1a0a0a; border: 1px solid #3d1a1a; border-radius: var(--radius); padding: 20px; text-align: center; margin: 20px 0; }
  .error-box p { color: #ff8080; font-size: 14px; line-height: 1.6; }

  /* POSICIONES */
  .pos-table { width: 100%; border-collapse: collapse; }
  .pos-table thead tr { border-bottom: 1px solid var(--border); }
  .pos-table thead th { font-size: 10px; color: var(--muted); font-weight: 500; padding: 6px 4px; text-align: center; letter-spacing: 0.5px; }
  .pos-table thead th:first-child { text-align: left; padding-left: 0; }
  .pos-table tbody tr { border-bottom: 1px solid #ffffff08; }
  .pos-table td { padding: 10px 4px; font-size: 13px; text-align: center; vertical-align: middle; }
  .pos-table td:first-child { text-align: left; padding-left: 0; }
  .pos-num { font-size: 11px; color: var(--muted); width: 20px; display: inline-block; }
  .pos-pts { font-weight: 700; color: var(--green); font-size: 15px; }
  .pos-top1 { color: #ffd600; }
  .pos-top2 { color: #c0c0c0; }
  .pos-top3 { color: #cd7f32; }

  /* PARTIDOS */
  .match-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; position: relative; overflow: hidden; }
  .match-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--green); opacity: 0.4; }
  .match-meta { font-size: 10px; color: var(--muted); margin-bottom: 10px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .fecha-badge { background: var(--green-dim); color: var(--green); border-radius: 4px; padding: 2px 6px; font-weight: 600; }
  .match-teams { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; }
  .match-team { font-weight: 600; font-size: 13px; }
  .match-team.home { text-align: right; }
  .match-team.away { text-align: left; }
  .match-score { background: var(--dark); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px; text-align: center; min-width: 70px; }
  .match-score.pending { font-size: 13px; color: var(--muted); font-family: 'DM Sans'; letter-spacing: 0; }

  /* GOLEADORES */
  .scorer-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #ffffff08; }
  .scorer-rank { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--muted); width: 28px; text-align: center; flex-shrink: 0; }
  .scorer-rank.top { color: var(--green); }
  .scorer-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--card2); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; flex-shrink: 0; }
  .scorer-info { flex: 1; min-width: 0; }
  .scorer-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .scorer-club { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .scorer-goals { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--green); flex-shrink: 0; }
  .scorer-goals span { font-size: 11px; color: var(--muted); font-family: 'DM Sans'; }

  /* EQUIPOS */
  .team-select { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; appearance: none; outline: none; margin-bottom: 16px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
  .stat-card .val { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--green); line-height: 1; }
  .stat-card .val.red { color: var(--red); }
  .stat-card .val.yellow { color: var(--yellow); }
  .stat-card .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .last3 { display: flex; gap: 6px; margin-bottom: 16px; }
  .last3-item { flex: 1; border-radius: 10px; padding: 10px 6px; text-align: center; border: 1px solid transparent; }
  .last3-item.W { background:#00c85318; border-color:#00c85340; }
  .last3-item.D { background:#ffd60018; border-color:#ffd60040; }
  .last3-item.L { background:#ff3d3d18; border-color:#ff3d3d40; }
  .last3-result { font-family: 'Bebas Neue', sans-serif; font-size: 26px; }
  .last3-item.W .last3-result { color: var(--green); }
  .last3-item.D .last3-result { color: var(--yellow); }
  .last3-item.L .last3-result { color: var(--red); }
  .last3-score { font-size: 16px; font-weight: 700; margin: 2px 0; }
  .last3-opp { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .view-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .view-tab { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px; font-size: 12px; color: var(--muted); cursor: pointer; text-align: center; transition: all 0.2s; }
  .view-tab.active { background: var(--green-dim); border-color: var(--green); color: var(--green); font-weight: 600; }
  .hidden { display: none !important; }
  .empty { color: var(--muted); text-align: center; padding: 30px; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo-circle">🏑</div>
    <div>
      <div class="header-title">AHBA Hockey</div>
      <div class="header-sub" id="header-sub">Buenos Aires · 2025</div>
    </div>
    <div class="torneo-badge" id="torneo-name">Cargando...</div>
  </div>
  <div class="selector-bar" id="zona-selector"></div>
</div>

<div class="content" id="main-content">
  <div class="loading"><div class="spinner"></div><p>Cargando torneo...</p></div>
</div>

<nav class="nav-tabs">
  <button class="nav-tab active" onclick="showTab('posiciones')" id="tab-posiciones">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    Posiciones
  </button>
  <button class="nav-tab" onclick="showTab('resultados')" id="tab-resultados">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    Fixture
  </button>
  <button class="nav-tab" onclick="showTab('goleadores')" id="tab-goleadores">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
    Goleadores
  </button>
  <button class="nav-tab" onclick="showTab('equipos')" id="tab-equipos">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
    Equipos
  </button>
</nav>

<script>
const PROXY = 'https://ahba-proxy.vercel.app';
const TORNEO_ID = '00000461';

let torneoData = null;
let currentTab = 'posiciones';
let currentZona = null;
let currentEquipo = null;

async function fetchProxy(path) {
  const r = await fetch(`${PROXY}/api/proxy?path=${encodeURIComponent(path)}`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function init() {
  setContent(`<div class="loading"><div class="spinner"></div><p>Cargando torneo...</p></div>`);
  try {
    torneoData = await fetchProxy(`/torneos/${TORNEO_ID}`);
  } catch(e) {
    setContent(`<div class="error-box"><p>❌ No se pudo conectar al proxy.<br>${e.message}</p></div>`);
    return;
  }

  // Nombre del torneo
  const det = torneoData.detalle || {};
  const nombre = det.nombreTorneo || det.nombre || `Torneo ${TORNEO_ID}`;
  const cat = det.categoria?.categoriaNombre || det.categoria || '';
  document.getElementById('torneo-name').textContent = nombre;
  if (cat) document.getElementById('header-sub').textContent = `${cat} · Buenos Aires`;

  // Zonas: están en fases[0].zonas
  const zonas = getZonas();
  if (zonas.length > 0) {
    currentZona = zonas[0];
    buildZonaSelector(zonas);
  }

  renderTab('posiciones');
}

function getZonas() {
  if (!torneoData) return [];
  const fases = torneoData.fases || [];
  if (fases.length > 0) {
    const fase = fases[0];
    return fase.zonas || fase.divisions || fase.grupos || [];
  }
  return [];
}

function buildZonaSelector(zonas) {
  const sel = document.getElementById('zona-selector');
  sel.innerHTML = zonas.map((z, i) => {
    const n = z.nombre || z.name || z.zona || `Zona ${i+1}`;
    return `<div class="cat-chip ${i===0?'active':''}" onclick="selectZona(${i},this)">${n}</div>`;
  }).join('');
}

function selectZona(idx, el) {
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  currentZona = getZonas()[idx];
  currentEquipo = null;
  renderTab(currentTab);
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  renderTab(tab);
}

function renderTab(tab) {
  ({posiciones:renderPosiciones, resultados:renderResultados, goleadores:renderGoleadores, equipos:renderEquipos})[tab]?.();
}

function setContent(html) { document.getElementById('main-content').innerHTML = html; }

// ── HELPERS ──────────────────────────────────────────────────────
function getEquipos(zona) {
  if (!zona) return [];
  return zona.equipos || zona.teams || zona.tabla || [];
}

function getPartidos(zona) {
  if (!zona) return [];
  // Los partidos pueden estar en la zona directamente o en fases
  let ps = zona.partidos || zona.matches || zona.encuentros || [];
  if (ps.length === 0 && torneoData?.fases?.[0]?.partidos) ps = torneoData.fases[0].partidos;
  // Filtrar partidos de esta zona
  if (ps.length > 0 && zona.nombre) {
    const filtered = ps.filter(p => p.zona === zona.nombre || p.zonaNombre === zona.nombre);
    if (filtered.length > 0) return filtered;
  }
  return ps;
}

function formatDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'}); } catch(e){return '';}
}

// ── POSICIONES ────────────────────────────────────────────────────
function renderPosiciones() {
  const equipos = getEquipos(currentZona);
  if (!equipos.length) {
    return setContent(`<div class="error-box"><p>No hay datos de posiciones para esta zona.</p></div>`);
  }

  const sorted = [...equipos].sort((a,b)=>{
    const pa = a.puntos??a.pts??a.points??0;
    const pb = b.puntos??b.pts??b.points??0;
    if (pb !== pa) return pb - pa;
    // Desempate por DG
    const da = (a.golesFavor??a.gf??0)-(a.golesContra??a.gc??0);
    const db = (b.golesFavor??b.gf??0)-(b.golesContra??b.gc??0);
    return db - da;
  });

  const rows = sorted.map((eq,i)=>{
    const n  = eq.nombre||eq.name||eq.equipo||eq.club||`Equipo ${i+1}`;
    const pts= eq.puntos??eq.pts??eq.points??'-';
    const pj = eq.partidosJugados??eq.pj??eq.played??'-';
    const pg = eq.ganados??eq.pg??eq.won??'-';
    const pe = eq.empatados??eq.pe??eq.drawn??'-';
    const pp = eq.perdidos??eq.pp??eq.lost??'-';
    const gf = eq.golesFavor??eq.gf??eq.goalsFor??0;
    const gc = eq.golesContra??eq.gc??eq.goalsAgainst??0;
    const dg = (typeof gf==='number'&&typeof gc==='number') ? `${gf-gc>0?'+':''}${gf-gc}` : '-';
    const rankClass = i===0?'pos-top1':i===1?'pos-top2':i===2?'pos-top3':'';
    return `<tr>
      <td><span class="pos-num ${rankClass}">${i+1}</span> ${n}</td>
      <td>${pj}</td><td>${pg}</td><td>${pe}</td><td>${pp}</td><td>${dg}</td>
      <td><span class="pos-pts">${pts}</span></td>
    </tr>`;
  }).join('');

  setContent(`<div class="section-title">Tabla de Posiciones</div>
    <table class="pos-table">
      <thead><tr><th style="text-align:left">Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>DG</th><th>PTS</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`);
}

// ── FIXTURE ───────────────────────────────────────────────────────
function renderResultados() {
  const partidos = getPartidos(currentZona);
  if (!partidos.length) {
    return setContent(`<div class="error-box"><p>No hay partidos disponibles.</p></div>`);
  }

  const jugados = partidos.filter(p=>p.played||p.jugado||(p.golesLocal!=null&&p.golesLocal!=='')).reverse().slice(0,30);
  const pendientes = partidos.filter(p=>!p.played&&!p.jugado&&(p.golesLocal==null||p.golesLocal==='')).slice(0,20);

  function card(p, pending) {
    const home = p.nombreLocal||p.local||p.homeTeam||p.equipoLocal||'Local';
    const away = p.nombreVisitante||p.visitante||p.awayTeam||p.equipoVisitante||'Visitante';
    const hg = p.golesLocal??p.golesHome??'';
    const ag = p.golesVisitante??p.golesAway??'';
    const fecha = p.horario||p.fecha||p.date||'';
    const jorn = p.numeroFecha||p.jornada||p.round||'';
    const score = pending
      ? `<div class="match-score pending">${fecha?formatDate(fecha):'Pendiente'}</div>`
      : `<div class="match-score">${hg} - ${ag}</div>`;
    return `<div class="match-card">
      <div class="match-meta">
        ${jorn?`<span class="fecha-badge">F${jorn}</span>`:''}
        ${fecha&&!pending?`<span>${formatDate(fecha)}</span>`:''}
      </div>
      <div class="match-teams">
        <div class="match-team home">${home}</div>${score}<div class="match-team away">${away}</div>
      </div>
    </div>`;
  }

  setContent(`<div class="section-title">Fixture</div>
    <div class="view-tabs">
      <div class="view-tab active" id="vt-jugados" onclick="toggleView('jugados')">Jugados (${jugados.length})</div>
      <div class="view-tab" id="vt-proximos" onclick="toggleView('proximos')">Próximos (${pendientes.length})</div>
    </div>
    <div id="view-jugados">${jugados.map(p=>card(p,false)).join('')||'<p class="empty">Sin resultados</p>'}</div>
    <div id="view-proximos" class="hidden">${pendientes.map(p=>card(p,true)).join('')||'<p class="empty">Sin próximos partidos</p>'}</div>`);
}

window.toggleView = function(v) {
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`vt-${v}`).classList.add('active');
  document.getElementById('view-jugados').classList.toggle('hidden',v!=='jugados');
  document.getElementById('view-proximos').classList.toggle('hidden',v!=='proximos');
};

// ── GOLEADORES ────────────────────────────────────────────────────
function renderGoleadores() {
  // Goleadores pueden estar en torneoData.goleadores o dentro de zona
  let goles = torneoData?.goleadores || currentZona?.goleadores || [];

  // Si no hay lista, extraer de partidos
  if (!goles.length) {
    const mapa = {};
    getPartidos(currentZona).forEach(p => {
      (p.resumenEventosJugadores||p.resumenEventosOficiales||[]).forEach(ev => {
        if (ev.tipo==='GOL'||ev.type==='goal'||ev.goles>0) {
          const key = ev.jugadorId||ev.nombre||ev.name;
          if (!mapa[key]) mapa[key] = { nombre: ev.nombre||ev.name||key, club: ev.equipo||ev.team||'', goles: 0 };
          mapa[key].goles += ev.goles||1;
        }
      });
    });
    goles = Object.values(mapa);
  }

  if (!goles.length) {
    return setContent(`<div class="error-box"><p>No hay datos de goleadores disponibles.</p></div>`);
  }

  const sorted = [...goles].sort((a,b)=>(b.goles??b.goals??0)-(a.goles??a.goals??0)).slice(0,30);

  const rows = sorted.map((g,i)=>{
    const n = g.nombre||g.name||g.jugador||`Jugador ${i+1}`;
    const c = g.club||g.equipo||g.team||g.nombreClub||'';
    const gl = g.goles??g.goals??0;
    return `<div class="scorer-row">
      <div class="scorer-rank ${i<3?'top':''}">${i+1}</div>
      <div class="scorer-avatar">${n.charAt(0)}</div>
      <div class="scorer-info"><div class="scorer-name">${n}</div>${c?`<div class="scorer-club">${c}</div>`:''}</div>
      <div class="scorer-goals">${gl}<span>gls</span></div>
    </div>`;
  }).join('');

  setContent(`<div class="section-title">Goleadores</div>${rows}`);
}

// ── EQUIPOS ───────────────────────────────────────────────────────
function renderEquipos() {
  const equipos = getEquipos(currentZona);
  const partidos = getPartidos(currentZona);
  if (!equipos.length) return setContent(`<div class="error-box"><p>No hay equipos disponibles.</p></div>`);
  if (!currentEquipo) currentEquipo = equipos[0];

  const options = equipos.map(eq=>{
    const n = eq.nombre||eq.name||eq.club||'';
    return `<option value="${n}" ${eq===currentEquipo?'selected':''}>${n}</option>`;
  }).join('');

  function teamStats(eq) {
    const nombre = eq.nombre||eq.name||eq.club||'';
    const pts = eq.puntos??eq.pts??0;
    const pj  = eq.partidosJugados??eq.pj??eq.played??0;
    const pg  = eq.ganados??eq.pg??eq.won??0;
    const pe  = eq.empatados??eq.pe??eq.drawn??0;
    const pp  = eq.perdidos??eq.pp??eq.lost??0;
    const gf  = eq.golesFavor??eq.gf??0;
    const gc  = eq.golesContra??eq.gc??0;

    const ultimos = partidos.filter(p=>{
      const h = p.nombreLocal||p.local||p.homeTeam||'';
      const a = p.nombreVisitante||p.visitante||p.awayTeam||'';
      return (h===nombre||a===nombre)&&(p.golesLocal!=null&&p.golesLocal!=='');
    }).slice(-3);

    let last3 = '';
    if (ultimos.length) {
      last3 = `<div class="section-title" style="font-size:16px;margin-bottom:8px">Últimos partidos</div>
      <div class="last3">${ultimos.map(p=>{
        const isH=(p.nombreLocal||p.local||'')===nombre;
        const myG=isH?(p.golesLocal??0):(p.golesVisitante??0);
        const thG=isH?(p.golesVisitante??0):(p.golesLocal??0);
        const opp=isH?(p.nombreVisitante||p.visitante||'Rival'):(p.nombreLocal||p.local||'Rival');
        const res=myG>thG?'W':myG<thG?'L':'D';
        const lbl=res==='W'?'G':res==='L'?'P':'E';
        return `<div class="last3-item ${res}">
          <div class="last3-result">${lbl}</div>
          <div class="last3-score">${myG}-${thG}</div>
          <div class="last3-opp">${opp.split(' ')[0]}</div>
        </div>`;
      }).join('')}</div>`;
    }

    return `<div class="stat-grid">
      <div class="stat-card"><div class="val">${pts}</div><div class="lbl">PUNTOS</div></div>
      <div class="stat-card"><div class="val">${pj}</div><div class="lbl">PARTIDOS</div></div>
      <div class="stat-card"><div class="val">${pg}</div><div class="lbl">GANADOS</div></div>
      <div class="stat-card"><div class="val yellow">${pe}</div><div class="lbl">EMPATADOS</div></div>
      <div class="stat-card"><div class="val red">${pp}</div><div class="lbl">PERDIDOS</div></div>
      <div class="stat-card"><div class="val">${gf}</div><div class="lbl">GOLES A FAVOR</div></div>
      <div class="stat-card"><div class="val red">${gc}</div><div class="lbl">GOLES EN CONTRA</div></div>
      <div class="stat-card"><div class="val ${gf-gc>=0?'':'red'}">${gf-gc>0?'+':''}${gf-gc}</div><div class="lbl">DIF. GOLES</div></div>
    </div>${last3}`;
  }

  setContent(`<div class="section-title">Estadísticas por Equipo</div>
    <select class="team-select" onchange="selectTeam(this.value)">${options}</select>
    <div id="team-stats-content">${teamStats(currentEquipo)}</div>`);
}

window.selectTeam = function(nombre) {
  currentEquipo = getEquipos(currentZona).find(eq=>(eq.nombre||eq.name||eq.club||'')===nombre)||getEquipos(currentZona)[0];
  renderEquipos();
};

init();
</script>
</body>
</html>
