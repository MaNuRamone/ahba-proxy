<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AHBA Hockey Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00c853;
    --green-dim: #00c85322;
    --green-glow: #00c85355;
    --dark: #0a0f0d;
    --card: #111a14;
    --card2: #162019;
    --border: #1e2e21;
    --text: #e8f5e9;
    --muted: #6b8f72;
    --red: #ff3d3d;
    --yellow: #ffd600;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding-bottom: 90px; }

  .header { background: linear-gradient(180deg, #0d1f10 0%, var(--dark) 100%); padding: 20px 16px 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .logo-circle { width: 42px; height: 42px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; box-shadow: 0 0 16px var(--green-glow); }
  .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; line-height: 1; }
  .header-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }
  .torneo-badge { margin-left: auto; background: var(--green-dim); border: 1px solid var(--green); border-radius: 20px; padding: 4px 10px; font-size: 11px; color: var(--green); font-weight: 500; white-space: nowrap; }

  .selector-bar { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
  .selector-bar::-webkit-scrollbar { display: none; }
  .cat-chip { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 12px; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.2s; flex-shrink: 0; }
  .cat-chip.active { background: var(--green); color: var(--dark); border-color: var(--green); font-weight: 700; }

  .nav-tabs { position: fixed; bottom: 0; left: 0; right: 0; background: #0d1a10ee; backdrop-filter: blur(16px); border-top: 1px solid var(--border); display: flex; z-index: 100; }
  .nav-tab { flex: 1; padding: 12px 4px 14px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: var(--muted); font-size: 10px; font-weight: 500; letter-spacing: 0.3px; transition: color 0.2s; border: none; background: none; }
  .nav-tab.active { color: var(--green); }
  .nav-tab svg { width: 22px; height: 22px; }

  .content { padding: 16px; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; margin-bottom: 12px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: var(--muted); font-size: 14px; }

  .error-box { background: #1a0a0a; border: 1px solid #3d1a1a; border-radius: var(--radius); padding: 20px; text-align: center; margin: 20px 0; }
  .error-box .err-icon { font-size: 32px; margin-bottom: 8px; }
  .error-box p { color: #ff8080; font-size: 14px; line-height: 1.5; }
  .error-box small { color: var(--muted); font-size: 11px; display: block; margin-top: 8px; word-break: break-all; }

  /* POSICIONES */
  .pos-table { width: 100%; border-collapse: collapse; }
  .pos-table thead tr { border-bottom: 1px solid var(--border); }
  .pos-table thead th { font-size: 10px; color: var(--muted); font-weight: 500; padding: 6px 4px; text-align: center; letter-spacing: 0.5px; }
  .pos-table thead th:first-child { text-align: left; padding-left: 0; }
  .pos-table tbody tr { border-bottom: 1px solid #ffffff08; transition: background 0.15s; }
  .pos-table tbody tr:hover { background: var(--card); }
  .pos-table td { padding: 10px 4px; font-size: 13px; text-align: center; vertical-align: middle; }
  .pos-table td:first-child { text-align: left; padding-left: 0; }
  .pos-num { font-size: 11px; color: var(--muted); width: 18px; display: inline-block; }
  .pos-pts { font-weight: 700; color: var(--green); font-size: 14px; }
  .team-name { font-weight: 500; font-size: 13px; }

  /* PARTIDOS */
  .match-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; position: relative; overflow: hidden; }
  .match-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--green); opacity: 0.4; }
  .match-meta { font-size: 10px; color: var(--muted); margin-bottom: 10px; display: flex; gap: 8px; align-items: center; }
  .match-meta .fecha-badge { background: var(--green-dim); color: var(--green); border-radius: 4px; padding: 2px 6px; font-weight: 600; }
  .match-teams { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; }
  .match-team { font-weight: 600; font-size: 14px; }
  .match-team.home { text-align: right; }
  .match-team.away { text-align: left; }
  .match-score { background: var(--dark); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px; color: var(--text); text-align: center; min-width: 70px; }
  .match-score.pending { font-size: 14px; color: var(--muted); font-family: 'DM Sans'; }

  /* GOLEADORES */
  .scorer-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #ffffff08; }
  .scorer-rank { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--muted); width: 28px; text-align: center; flex-shrink: 0; }
  .scorer-rank.top { color: var(--green); }
  .scorer-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--card2); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .scorer-info { flex: 1; }
  .scorer-name { font-weight: 600; font-size: 14px; }
  .scorer-club { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .scorer-goals { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--green); }
  .scorer-goals span { font-size: 12px; color: var(--muted); font-family: 'DM Sans'; }

  /* EQUIPOS */
  .team-select { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; appearance: none; outline: none; margin-bottom: 16px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
  .stat-card .val { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--green); line-height: 1; }
  .stat-card .val.red { color: var(--red); }
  .stat-card .val.yellow { color: var(--yellow); }
  .stat-card .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 0.5px; }
  .last3 { display: flex; gap: 6px; margin-bottom: 16px; }
  .last3-item { flex: 1; border-radius: 10px; padding: 10px 6px; text-align: center; border: 1px solid transparent; }
  .last3-item.W { background: #00c85318; border-color: #00c85340; }
  .last3-item.D { background: #ffd60018; border-color: #ffd60040; }
  .last3-item.L { background: #ff3d3d18; border-color: #ff3d3d40; }
  .last3-result { font-family: 'Bebas Neue', sans-serif; font-size: 26px; }
  .last3-item.W .last3-result { color: var(--green); }
  .last3-item.D .last3-result { color: var(--yellow); }
  .last3-item.L .last3-result { color: var(--red); }
  .last3-score { font-size: 16px; font-weight: 700; margin: 2px 0; }
  .last3-opp { font-size: 10px; color: var(--muted); }

  .view-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .view-tab { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px; font-size: 12px; color: var(--muted); cursor: pointer; text-align: center; transition: all 0.2s; }
  .view-tab.active { background: var(--green-dim); border-color: var(--green); color: var(--green); font-weight: 600; }

  /* DEBUG panel */
  .debug-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin: 12px 0; font-size: 11px; color: var(--muted); word-break: break-all; max-height: 200px; overflow-y: auto; }
  .debug-box pre { white-space: pre-wrap; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo-circle">🏑</div>
    <div>
      <div class="header-title">AHBA Hockey</div>
      <div class="header-sub">Buenos Aires · 2025</div>
    </div>
    <div class="torneo-badge" id="torneo-name">Cargando...</div>
  </div>
  <div class="selector-bar" id="zona-selector"></div>
</div>

<div class="content" id="main-content">
  <div class="loading"><div class="spinner"></div><p>Conectando con el proxy...</p></div>
</div>

<nav class="nav-tabs">
  <button class="nav-tab active" onclick="showTab('posiciones')" id="tab-posiciones">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    Posiciones
  </button>
  <button class="nav-tab" onclick="showTab('resultados')" id="tab-resultados">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    Fixture
  </button>
  <button class="nav-tab" onclick="showTab('goleadores')" id="tab-goleadores">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
    Goleadores
  </button>
  <button class="nav-tab" onclick="showTab('equipos')" id="tab-equipos">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
    Equipos
  </button>
</nav>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CONFIGURACIÓN — cambiá PROXY_BASE por tu URL de Vercel
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const PROXY_BASE = 'https://TU-PROYECTO.vercel.app'; // ← reemplazar después del deploy
const TORNEO_ID = '00000461';

let torneoData = null;
let currentTab = 'posiciones';
let currentZona = null;
let currentEquipo = null;

// ─── FETCH VÍA PROXY ─────────────────────────────────────
async function fetchAPI(path) {
  const url = `${PROXY_BASE}/api/proxy?path=${encodeURIComponent(path)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} — ${await res.text()}`);
  return res.json();
}

// ─── INIT ─────────────────────────────────────────────────
async function init() {
  setContent(`<div class="loading"><div class="spinner"></div><p>Cargando torneo...</p></div>`);
  try {
    torneoData = await fetchAPI(`/torneos/${TORNEO_ID}`);
  } catch(e) {
    setContent(`
      <div class="error-box">
        <div class="err-icon">⚠️</div>
        <p>No se pudo conectar al proxy.</p>
        <small>${e.message}</small>
      </div>
      <div class="debug-box">
        <b>URL del proxy:</b><br>${PROXY_BASE}/api/proxy?path=/torneos/${TORNEO_ID}<br><br>
        <b>¿Configuraste PROXY_BASE?</b><br>Reemplazá "TU-PROYECTO" por tu URL de Vercel en el código.
      </div>
    `);
    document.getElementById('torneo-name').textContent = 'Sin proxy';
    return;
  }

  console.log('Torneo data:', torneoData);

  const nombre = torneoData.nombre || torneoData.name || torneoData.titulo || `Torneo ${TORNEO_ID}`;
  document.getElementById('torneo-name').textContent = nombre;

  const zonas = getZonas();
  if (zonas.length > 0) {
    currentZona = zonas[0];
    buildZonaSelector(zonas);
  }

  renderTab('posiciones');
}

function getZonas() {
  if (!torneoData) return [];
  if (Array.isArray(torneoData)) return torneoData;
  if (torneoData.zonas) return torneoData.zonas;
  if (torneoData.grupos) return torneoData.grupos;
  if (torneoData.categorias) return torneoData.categorias;
  if (torneoData.divisions) return torneoData.divisions;
  if (torneoData.zones) return torneoData.zones;
  return [torneoData];
}

function buildZonaSelector(zonas) {
  const sel = document.getElementById('zona-selector');
  sel.innerHTML = zonas.map((z, i) => {
    const n = z.nombre || z.name || z.zona || z.grupo || `Zona ${i+1}`;
    return `<div class="cat-chip ${i===0?'active':''}" onclick="selectZona(${i},this)">${n}</div>`;
  }).join('');
}

function selectZona(idx, el) {
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  currentZona = getZonas()[idx];
  currentEquipo = null;
  renderTab(currentTab);
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  renderTab(tab);
}

function renderTab(tab) {
  const map = { posiciones: renderPosiciones, resultados: renderResultados, goleadores: renderGoleadores, equipos: renderEquipos };
  map[tab]?.();
}

function setContent(html) { document.getElementById('main-content').innerHTML = html; }

// ─── GETTERS GENÉRICOS ────────────────────────────────────
const get = (obj, ...keys) => { for (const k of keys) { if (obj?.[k] != null) return obj[k]; } return null; };
function getEquipos(z) { return get(z,'equipos','teams','clubs','participantes') || []; }
function getPartidos(z) { return get(z,'partidos','matches','fixtures','games','encuentros') || []; }
function getGoleadores(z) { return get(z,'goleadores','scorers','artilleros') || []; }
function formatDate(d) { try { return new Date(d).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'}); } catch(e){return d||'';} }

// ─── POSICIONES ───────────────────────────────────────────
function renderPosiciones() {
  const equipos = getEquipos(currentZona);
  if (!equipos.length) {
    return setContent(`<div class="error-box"><div class="err-icon">📊</div><p>No se encontraron equipos.</p><small>Keys disponibles: ${Object.keys(currentZona||{}).join(', ')}</small></div>`);
  }
  const sorted = [...equipos].sort((a,b)=>(get(b,'puntos','pts','points')||0)-(get(a,'puntos','pts','points')||0));
  const rows = sorted.map((eq,i)=>{
    const n  = get(eq,'nombre','name','equipo','club') || `Equipo ${i+1}`;
    const pts= get(eq,'puntos','pts','points') ?? '-';
    const pj = get(eq,'partidosJugados','pj','played','gamesPlayed') ?? '-';
    const pg = get(eq,'partidosGanados','pg','won','ganados') ?? '-';
    const pe = get(eq,'partidosEmpatados','pe','drawn','empatados') ?? '-';
    const pp = get(eq,'partidosPerdidos','pp','lost','perdidos') ?? '-';
    const gf = get(eq,'golesFavor','gf','goalsFor','goals_for') ?? 0;
    const gc = get(eq,'golesContra','gc','goalsAgainst','goals_against') ?? 0;
    const dg = (gf!==0||gc!==0) ? `${gf-gc>0?'+':''}${gf-gc}` : '-';
    return `<tr><td><span class="pos-num">${i+1}</span><span class="team-name"> ${n}</span></td><td>${pj}</td><td>${pg}</td><td>${pe}</td><td>${pp}</td><td>${dg}</td><td><span class="pos-pts">${pts}</span></td></tr>`;
  }).join('');
  setContent(`<div class="section-title">Tabla de Posiciones</div>
    <table class="pos-table">
      <thead><tr><th style="text-align:left">Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>DG</th><th>PTS</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`);
}

// ─── FIXTURE ──────────────────────────────────────────────
function renderResultados() {
  const partidos = getPartidos(currentZona);
  if (!partidos.length) {
    return setContent(`<div class="error-box"><div class="err-icon">🗓️</div><p>No hay partidos disponibles.</p><small>Keys: ${Object.keys(currentZona||{}).join(', ')}</small></div>`);
  }
  const jugados   = partidos.filter(p=>get(p,'golesLocal','golesHome','scoreHome','home_score','local_goles')!=null).reverse().slice(0,30);
  const pendientes= partidos.filter(p=>get(p,'golesLocal','golesHome','scoreHome','home_score','local_goles')==null).slice(0,20);

  function card(p, pending) {
    const home  = get(p,'equipoLocal','local','homeTeam','home','equipo_local') || 'Local';
    const away  = get(p,'equipoVisitante','visitante','awayTeam','away','equipo_visitante') || 'Visitante';
    const hg    = get(p,'golesLocal','golesHome','scoreHome','home_score','local_goles') ?? '';
    const ag    = get(p,'golesVisitante','golesAway','scoreAway','away_score','visitante_goles') ?? '';
    const fecha = get(p,'fecha','date') || '';
    const jorn  = get(p,'jornada','round','fecha_numero') || '';
    const hora  = get(p,'hora','time') || '';
    const score = pending
      ? `<div class="match-score pending">${hora||'Pendiente'}</div>`
      : `<div class="match-score">${hg} - ${ag}</div>`;
    return `<div class="match-card">
      <div class="match-meta">
        ${jorn?`<span class="fecha-badge">F${jorn}</span>`:''}
        ${fecha?`<span>${formatDate(fecha)}</span>`:''}
      </div>
      <div class="match-teams">
        <div class="match-team home">${home}</div>${score}<div class="match-team away">${away}</div>
      </div>
    </div>`;
  }

  setContent(`<div class="section-title">Fixture</div>
    <div class="view-tabs">
      <div class="view-tab active" id="vt-jugados" onclick="toggleView('jugados')">Jugados (${jugados.length})</div>
      <div class="view-tab" id="vt-proximos" onclick="toggleView('proximos')">Próximos (${pendientes.length})</div>
    </div>
    <div id="view-jugados">${jugados.map(p=>card(p,false)).join('')||'<p style="color:var(--muted);text-align:center;padding:20px">Sin resultados</p>'}</div>
    <div id="view-proximos" class="hidden">${pendientes.map(p=>card(p,true)).join('')||'<p style="color:var(--muted);text-align:center;padding:20px">Sin próximos</p>'}</div>`);
}

window.toggleView = function(v) {
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`vt-${v}`).classList.add('active');
  document.getElementById('view-jugados').classList.toggle('hidden', v!=='jugados');
  document.getElementById('view-proximos').classList.toggle('hidden', v!=='proximos');
};

// ─── GOLEADORES ───────────────────────────────────────────
function renderGoleadores() {
  let goles = getGoleadores(currentZona);
  if (!goles.length) {
    getEquipos(currentZona).forEach(eq=>{
      (get(eq,'jugadores','players')||[]).forEach(j=>{
        if ((get(j,'goles','goals','golesAnotados')||0)>0) goles.push({...j,club:get(eq,'nombre','name','club')});
      });
    });
  }
  if (!goles.length) return setContent(`<div class="error-box"><div class="err-icon">⭐</div><p>No hay datos de goleadores.</p></div>`);
  const sorted = [...goles].sort((a,b)=>(get(b,'goles','goals','golesAnotados')||0)-(get(a,'goles','goals','golesAnotados')||0)).slice(0,30);
  const rows = sorted.map((g,i)=>{
    const n = get(g,'nombre','name','jugador')||`Jugador ${i+1}`;
    const c = get(g,'club','equipo','team')||'';
    const gl= get(g,'goles','goals','golesAnotados')||0;
    return `<div class="scorer-row">
      <div class="scorer-rank ${i<3?'top':''}">${i+1}</div>
      <div class="scorer-avatar">${n.charAt(0)}</div>
      <div class="scorer-info"><div class="scorer-name">${n}</div>${c?`<div class="scorer-club">${c}</div>`:''}</div>
      <div class="scorer-goals">${gl} <span>goles</span></div>
    </div>`;
  }).join('');
  setContent(`<div class="section-title">Goleadores</div>${rows}`);
}

// ─── EQUIPOS ──────────────────────────────────────────────
function renderEquipos() {
  const equipos = getEquipos(currentZona);
  const partidos = getPartidos(currentZona);
  if (!equipos.length) return setContent(`<div class="error-box"><div class="err-icon">👥</div><p>No hay equipos.</p></div>`);
  if (!currentEquipo) currentEquipo = equipos[0];

  const options = equipos.map(eq=>{
    const n = get(eq,'nombre','name','club','equipo')||'';
    return `<option value="${n}" ${eq===currentEquipo?'selected':''}>${n}</option>`;
  }).join('');

  function teamStats(eq) {
    const nombre = get(eq,'nombre','name','club','equipo')||'';
    const pts = get(eq,'puntos','pts','points')||0;
    const pj  = get(eq,'partidosJugados','pj','played')||0;
    const pg  = get(eq,'partidosGanados','pg','won')||0;
    const pe  = get(eq,'partidosEmpatados','pe','drawn')||0;
    const pp  = get(eq,'partidosPerdidos','pp','lost')||0;
    const gf  = get(eq,'golesFavor','gf','goalsFor')||0;
    const gc  = get(eq,'golesContra','gc','goalsAgainst')||0;

    const ultimos = partidos.filter(p=>{
      const h = get(p,'equipoLocal','local','homeTeam','home')||'';
      const a = get(p,'equipoVisitante','visitante','awayTeam','away')||'';
      return (h===nombre||a===nombre) && get(p,'golesLocal','golesHome','scoreHome','home_score')!=null;
    }).slice(-3);

    let last3 = '';
    if (ultimos.length) {
      last3 = `<div class="section-title" style="font-size:16px;margin-bottom:8px">Últimos 3 partidos</div>
      <div class="last3">${ultimos.map(p=>{
        const isH = (get(p,'equipoLocal','local','homeTeam')||'')=== nombre;
        const myG = isH ? (get(p,'golesLocal','golesHome','scoreHome','home_score')||0) : (get(p,'golesVisitante','golesAway','scoreAway','away_score')||0);
        const thG = isH ? (get(p,'golesVisitante','golesAway','scoreAway','away_score')||0) : (get(p,'golesLocal','golesHome','scoreHome','home_score')||0);
        const opp = isH ? (get(p,'equipoVisitante','visitante','awayTeam')||'Rival') : (get(p,'equipoLocal','local','homeTeam')||'Rival');
        const res = myG>thG?'W':myG<thG?'L':'D';
        const lbl = res==='W'?'G':res==='L'?'P':'E';
        return `<div class="last3-item ${res}"><div class="last3-result">${lbl}</div><div class="last3-score">${myG}-${thG}</div><div class="last3-opp">${opp.split(' ')[0]}</div></div>`;
      }).join('')}</div>`;
    }

    return `<div class="stat-grid">
      <div class="stat-card"><div class="val">${pts}</div><div class="lbl">PUNTOS</div></div>
      <div class="stat-card"><div class="val">${pj}</div><div class="lbl">PARTIDOS</div></div>
      <div class="stat-card"><div class="val">${pg}</div><div class="lbl">GANADOS</div></div>
      <div class="stat-card"><div class="val yellow">${pe}</div><div class="lbl">EMPATADOS</div></div>
      <div class="stat-card"><div class="val red">${pp}</div><div class="lbl">PERDIDOS</div></div>
      <div class="stat-card"><div class="val">${gf}</div><div class="lbl">GOLES A FAVOR</div></div>
      <div class="stat-card"><div class="val red">${gc}</div><div class="lbl">GOLES EN CONTRA</div></div>
      <div class="stat-card"><div class="val ${gf-gc>=0?'':'red'}">${gf-gc>0?'+':''}${gf-gc}</div><div class="lbl">DIF. GOLES</div></div>
    </div>${last3}`;
  }

  setContent(`<div class="section-title">Estadísticas por Equipo</div>
    <select class="team-select" onchange="selectTeam(this.value)">${options}</select>
    <div id="team-stats-content">${teamStats(currentEquipo)}</div>`);
}

window.selectTeam = function(nombre) {
  const equipos = getEquipos(currentZona);
  currentEquipo = equipos.find(eq=>(get(eq,'nombre','name','club','equipo')||'')===nombre)||equipos[0];
  renderEquipos();
};

init();
</script>
</body>
</html>
